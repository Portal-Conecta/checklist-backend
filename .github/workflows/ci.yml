name: CI - Testes Unitários

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build e Testes (JUnit 5)
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: pom.xml

      - name: Validar codificação dos fontes
        shell: bash
        run: |
          if grep -rIl $'\xEF\xBB\xBF' --include='*.java' src; then
            echo 'Arquivos Java não podem conter BOM UTF-8.' >&2
            exit 1
          fi
          if grep -rIl -e $'\xC3\x83' -e $'\xC3\x82' -e $'\xC3\xA2' --include='*.java' src; then
            echo 'Foram encontradas sequências com codificação corrompida.' >&2
            exit 1
          fi

      - name: Executar verificação Maven
        run: ./mvnw --batch-mode --no-transfer-progress clean verify
