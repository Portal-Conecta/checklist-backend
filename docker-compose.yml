services:
  postgres:
    image: postgres:16-alpine
    container_name: conecta-checklist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-checklist_db}
      POSTGRES_USER: ${DB_USER:-checklist_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-checklist_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - checklist_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  checklist_postgres_data:
