# --- Database Configuration (Supabase Pooler) ---
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# --- Hibernate Configuration ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Security and Integration ---
checklist.security.swagger-public=true
checklist.security.jwt.secret=${JWT_SECRET:cG9ydGFsLWNvbmVjdGEtbW9kdWxvLWNoZWNrbGlzdC1taTc3LXNlY3JldC1rZXk=}
hub.api.url=${HUB_API_URL:http://localhost:8080}

# --- Initialization ---
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never