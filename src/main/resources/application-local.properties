spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:checklist_db}
spring.datasource.username=${DB_USER:checklist_user}
spring.datasource.password=${DB_PASSWORD:checklist_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never

# Ative o perfil mock enquanto o Hub nao estiver disponivel
# Para ativar: adicione "mock" em spring.profiles.active (ex: local,mock)
# Para desativar: remova "mock" de spring.profiles.active
