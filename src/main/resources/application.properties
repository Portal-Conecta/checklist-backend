spring.application.name=conecta.checklist
spring.profiles.default=local

server.port=${SERVER_PORT:8083}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

checklist.security.swagger-public=false
checklist.security.jwt.secret=${JWT_SECRET}

hub.api.url=${HUB_API_URL:http://localhost:8081}

checklist.timezone=America/Sao_Paulo
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:true}

checklist.draft.ttl-hours=${CHECKLIST_DRAFT_TTL_HOURS:4}