spring.application.name=conecta.checklist
spring.profiles.active=local
server.port=${SERVER_PORT:8083}
checklist.timezone=America/Sao_Paulo

# --- Database Configuration (SUPABASE POOLER IPv4) ---
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Forcar dialeto para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Hibernate Settings ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

checklist.security.swagger-public=false
checklist.security.jwt.secret=${JWT_SECRET}
hub.api.url=${HUB_API_URL:http://localhost:8080}

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true