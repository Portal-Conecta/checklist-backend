spring.application.name=conecta.checklist
spring.profiles.default=local

server.port=${SERVER_PORT:8083}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

checklist.security.swagger-public=false
checklist.security.jwt.secret=${JWT_SECRET}

hub.api.url=${HUB_API_URL:http://localhost:8080}

checklist.timezone=America/Sao_Paulo

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

app.rabbitmq.exchange=${RABBITMQ_EXCHANGE:notifications.exchange}
app.rabbitmq.queue=${RABBITMQ_QUEUE:notifications.dispatch.q}
app.rabbitmq.dlq=${RABBITMQ_DLQ:notifications.dispatch.dlq}
app.rabbitmq.routing-key=${RABBITMQ_ROUTING_KEY:checklist.non_compliance.created}   