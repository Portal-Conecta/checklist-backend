spring:
  application:
    name: checklist
  profiles:
    default: local

server:
  port: ${SERVER_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  otlp:
    metrics:
      export:
        enabled: ${MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED:false}
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  opentelemetry:
    resource-attributes:
      service.name: ${spring.application.name}
    tracing:
      export:
        otlp:
          endpoint: ${MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
      sampler: ${MANAGEMENT_OPENTELEMETRY_TRACING_SAMPLER:parentbased_traceidratio}

logging:
  structured:
    format:
      console: logstash
    json:
      add:
        service: ${spring.application.name}
        environment: ${PORTAL_ENVIRONMENT:local}
      rename:
        logger_name: logger
      include:
        mdc: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

checklist:
  security:
    swagger-public: false
    jwt:
      secret: ${JWT_SECRET}
  timezone: America/Sao_Paulo

hub:
  api:
    url: ${HUB_API_URL:http://localhost:8080}

---

spring:
  config:
    activate:
      on-profile: test

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
