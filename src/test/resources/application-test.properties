spring.jpa.show-sql=false
spring.sql.init.mode=never

checklist.security.swagger-public=true
checklist.security.jwt.secret=dGVzdC1vbmx5LWp3dC1zZWNyZXQtMzItYnl0ZXMtbm90LXJlYWw=
hub.api.url=http://localhost:8080

# Desabilita a infraestrutura RabbitMQ nos testes de contexto (@SpringBootTest profile "test").
# Com isso RabbitMQConfig/RabbitMQNotificationPublisher (ambos @ConditionalOnProperty) sao ignorados
# e o stub TestRabbitMQConfig fornece o NotificationEventPublisher. Testes que precisam do broker
# usam o profile "integration" com app.rabbitmq.* proprios.
app.rabbitmq.enabled=false

# Sem broker no profile "test", o health indicator do RabbitMQ (auto-configurado pelo
# starter-amqp) ficaria DOWN e deixaria /actuator/health em 503. Desligamos para os testes.
management.health.rabbit.enabled=false
